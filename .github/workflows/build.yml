name: Build and Deploy MkDocs

on:
  push:
    branches:
      - mkdocs  # 当推送到 mkdocs 分支时触发
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许推送代码

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出 mkdocs 分支
      - name: Checkout mkdocs branch
        uses: actions/checkout@v4
        with:
          ref: mkdocs  # 检出 mkdocs 分支
          
      # 2. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs
          pip install mkdocs-bootswatch  # 你使用的主题
          # 如果需要其他扩展，在这里添加
          # pip install mkdocs-material
          # pip install mkdocs-static-i18n
          
      # 4. 构建静态网站
      - name: Build MkDocs site
        run: mkdocs build --site-dir site
        
      # 5. 准备 main 分支并推送
      - name: Deploy to main branch
        run: |
          # 配置 git 用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 获取当前时间作为提交信息
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          # 切换到 main 分支（如果不存在则创建）
          git checkout main 2>/dev/null || git checkout --orphan main
          
          # 删除 main 分支上的所有旧文件（保留 .git）
          git rm -rf . 2>/dev/null || true
          
          # 复制新构建的文件
          cp -r site/* .
          
          # 添加所有文件
          git add .
          
          # 提交并推送
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy MkDocs site - $BUILD_TIME"
            git push origin main --force
          fi